<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Main network nodes (representing people/connections) -->
  <!-- Top center node (mentors) -->
  <circle cx="100" cy="40" r="18" fill="#3b82f6"/>
  
  <!-- Bottom left node (students) -->
  <circle cx="55" cy="145" r="18" fill="#06b6d4"/>
  
  <!-- Bottom right node (opportunities) -->
  <circle cx="145" cy="145" r="18" fill="#10b981"/>
  
  <!-- Middle nodes for additional connections -->
  <circle cx="65" cy="70" r="14" fill="#8b5cf6"/>
  <circle cx="135" cy="70" r="14" fill="#f59e0b"/>
  
  <!-- Connection lines (representing network) -->
  <line x1="100" y1="58" x2="65" y2="84" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="58" x2="135" y2="84" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
  <line x1="65" y1="84" x2="55" y2="127" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="135" y1="84" x2="145" y2="127" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
  <line x1="65" y1="84" x2="135" y2="84" stroke="#8b5cf6" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="100" y1="58" x2="100" y2="100" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  
  <!-- Handshake element (representing mentorship/connection) -->
  <g opacity="0.9">
    <!-- Left hand -->
    <path d="M 70 100 Q 65 110 70 115" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Right hand -->
    <path d="M 130 100 Q 135 110 130 115" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Connection point -->
    <circle cx="100" cy="108" r="4" fill="#06b6d4"/>
  </g>
  
  <!-- Graduate cap accent (education element) -->
  <g transform="translate(155, 25)">
    <rect x="-8" y="0" width="16" height="2" fill="#f59e0b" rx="1"/>
    <polygon points="0,2 -10,8 10,8" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Title or accent text (optional enhancement) -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>